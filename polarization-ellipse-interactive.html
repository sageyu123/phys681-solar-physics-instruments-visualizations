<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polarization Ellipse Interactive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --panel-h: 680px;
            --main-size: 450px;
            --side-size: 120px;
            --ui-font-text: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --ui-font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --math-font: "STIX Two Math", "Cambria Math", "Noto Sans Math", "Times New Roman", serif;
        }
        body {
            font-family: var(--ui-font-text);
            background-color: #1e1e1e;
            color: #eeeeee;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            gap: 20px;
            padding: 12px;
            box-sizing: border-box;
            flex-wrap: nowrap;
            overflow: auto;
        }
        .canvas-container {
            background-color: #2a2a2a;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            padding: 20px;
            flex: 0 0 auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .jones-legend {
            position: static;
            align-self: flex-end;
            background: rgba(20, 20, 20, 0.78);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 8px;
            padding: 8px 10px;
            font-family: var(--math-font);
            font-size: 14px;
            line-height: 1.35;
            color: #f1f1f1;
            pointer-events: none;
            min-width: 200px;
        }
        .jones-legend .title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .jones-legend .mono {
            font-family: var(--math-font);
            white-space: nowrap;
        }
        .jones-matrix {
            display: grid;
            grid-template-columns: auto auto auto;
            column-gap: 6px;
            align-items: center;
            margin-top: 2px;
            margin-bottom: 2px;
        }
        .jones-inline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .jones-matrix .left-bracket,
        .jones-matrix .right-bracket {
            font-size: 30px;
            line-height: 0.9;
            transform: translateY(-1px);
        }
        .jones-matrix .entries {
            display: grid;
            grid-template-rows: auto auto;
            row-gap: 2px;
        }
        .jones-phase-value {
            font-style: normal;
        }
        .sphere-container {
            background-color: #2a2a2a;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            padding: 16px;
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            overflow: auto;
            flex: 0 0 auto;
            box-sizing: border-box;
        }
        .sphere-title {
            font-size: 15px;
            font-weight: 600;
            font-family: var(--ui-font-display);
            letter-spacing: 0.2px;
            margin: 0;
        }
        #poincareCanvas {
            width: 100%;
            aspect-ratio: 1 / 1;
            display: block;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
        }
        .sphere-legend {
            width: 100%;
            margin: 0;
            display: block;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
        }
        .viz-grid {
            display: grid;
            grid-template-columns: var(--side-size) var(--main-size);
            grid-template-rows: var(--side-size) var(--main-size);
            gap: 10px;
            align-items: stretch;
            justify-items: stretch;
        }
        .corner-panel {
            visibility: hidden;
        }
        .wave-panel {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            width: 100%;
            height: 100%;
            display: block;
        }
        #polCanvas {
            width: 100%;
            height: 100%;
            display: block;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
        }
        .controls {
            background-color: #2a2a2a;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: auto;
            flex: 0 0 auto;
            box-sizing: border-box;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        .value-input {
            width: 90px;
            background-color: #1d1d1d;
            color: #eeeeee;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 4px 6px;
            font-size: 13px;
            text-align: right;
        }
        .math-symbol {
            font-family: "STIX Two Math", "Cambria Math", "Noto Sans Math", "Times New Roman", serif;
            font-weight: 600;
        }
        .math-var {
            font-family: "STIX Two Math", "Cambria Math", "Noto Sans Math", "Times New Roman", serif;
            font-style: italic;
        }
        .legend sub {
            font-family: "STIX Two Math", "Cambria Math", "Noto Sans Math", "Times New Roman", serif;
            font-size: 0.78em;
            line-height: 0;
            vertical-align: -0.25em;
        }
        .legend {
            margin-top: 10px;
            font-size: 14px;
        }
        .legend div {
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .playback-controls {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
        }
        .playback-controls button {
            background-color: #3a3a3a;
            color: #eeeeee;
            border: 1px solid #666;
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            min-width: 42px;
            font-weight: bold;
        }
        .playback-controls button:hover {
            background-color: #4a4a4a;
        }
        #pause_button.paused {
            background-color: #5a3a3a;
            border-color: #aa6666;
        }
        select {
            width: 100%;
            background-color: #1d1d1d;
            color: #eeeeee;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 6px;
            font-size: 13px;
        }
        .color-box {
            width: 15px;
            height: 15px;
            border-radius: 3px;
        }
        .label-with-color {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .field-expressions {
            margin-top: 4px;
            padding: 10px 12px;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 8px;
            font-family: var(--math-font);
            font-size: 15px;
            line-height: 1.45;
        }
        .field-expressions .title {
            font-family: var(--ui-font-text);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .field-expressions .expr {
            white-space: nowrap;
        }
        @media (max-width: 1024px) {
            body {
                flex-direction: column;
                align-items: stretch;
                justify-content: flex-start;
                gap: 12px;
                overflow-x: hidden;
                overflow-y: auto;
            }
            .sphere-container,
            .canvas-container,
            .controls {
                width: 100% !important;
                max-width: 100%;
            }
            .controls {
                max-height: none;
            }
            .jones-legend {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="sphere-container" id="panel-sphere">
        <h3 class="sphere-title">Poincar&eacute; Sphere</h3>
        <canvas id="poincareCanvas" width="280" height="280"></canvas>
        <img class="sphere-legend" src="figures/Poincaresp.png" alt="Poincaré sphere legend">
    </div>

    <div class="canvas-container" id="panel-xy">
        <div class="viz-grid">
            <div class="corner-panel"></div>
            <canvas id="topWaveCanvas" class="wave-panel" width="600" height="140"></canvas>
            <canvas id="leftWaveCanvas" class="wave-panel" width="140" height="600"></canvas>
            <canvas id="polCanvas" width="600" height="600"></canvas>
        </div>
        <div class="jones-legend" id="jones-legend">
            <div class="title">Jones Vector</div>
            <div class="jones-inline">
                <div class="mono"><span class="math-var">J</span> = <span id="jones-norm-known"></span><span class="math-var">e</span><sup><span class="math-var">iε</span><sub>x</sub></sup></div>
                <div class="jones-matrix">
                    <div class="left-bracket">[</div>
                    <div class="entries">
                        <div class="mono"><span id="jones-ex-known"></span></div>
                        <div class="mono"><span id="jones-ey-known"></span><span id="jones-phase-term"></span></div>
                    </div>
                    <div class="right-bracket">]</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls" id="controls-panel">
        <h3>Polarization Controls</h3>

        <div class="control-group">
            <div class="control-header">
                <span class="label-with-color"><div class="color-box" style="background:#ff4757;"></div><span><span class="math-var">E</span><sub>x</sub> Amplitude</span></span>
                <input class="value-input" type="number" id="ampO_input" min="0" max="300" step="1" value="150">
            </div>
            <input type="range" id="ampO" min="0" max="300" value="150">
        </div>

        <div class="control-group">
            <div class="control-header">
                <span class="label-with-color"><div class="color-box" style="background:#1e90ff;"></div><span><span class="math-var">E</span><sub>y</sub> Amplitude</span></span>
                <input class="value-input" type="number" id="ampE_input" min="0" max="300" step="1" value="150">
            </div>
            <input type="range" id="ampE" min="0" max="300" value="150">
        </div>

        <div class="control-group">
            <div class="control-header">
                <span>Phase Diff. (<span class="math-symbol">ε = ε</span><sub>y</sub><span class="math-symbol"> - ε</span><sub>x</sub> in <span class="math-symbol">π</span>)</span>
                <input class="value-input" type="number" id="phase_input" min="0" max="2" step="0.01" value="0.00">
            </div>
            <input type="range" id="phase" min="0" max="2" step="0.01" value="0.50">
        </div>

        <div class="control-group">
            <div class="control-header">
                <span>Current Phase (<span class="math-symbol">φ</span> in <span class="math-symbol">π</span>)</span>
                <input class="value-input" type="number" id="current_phase_input" min="0" max="2" step="0.01" value="0.00">
            </div>
            <input type="range" id="current_phase" min="0" max="2" step="0.01" value="0.00">
        </div>

        <div class="control-group">
            <div class="control-header">
                <span>Angular Speed (<span class="math-symbol">ω</span>, <span class="math-symbol">π</span>/sec)</span>
                <input class="value-input" type="number" id="speed_input" min="0" max="3.00" step="0.01" value="0.50">
            </div>
            <input type="range" id="speed" min="0" max="3.00" step="0.01" value="0.50">
        </div>

        <div class="control-group">
            <div class="control-header">
                <span>Playback</span>
            </div>
            <div class="playback-controls">
                <button type="button" id="step_back_button" title="Step backward">&lt;</button>
                <button type="button" id="pause_button" title="Pause / Play">||</button>
                <button type="button" id="step_forward_button" title="Step forward">&gt;</button>
            </div>
        </div>

        <div class="control-group">
            <div class="control-header">
                <span>Vector Layout</span>
            </div>
            <select id="vector_mode">
                <option value="component">Component</option>
                <option value="head-to-tail">Head-to-Tail</option>
            </select>
        </div>

        <div class="control-group" id="dashed_toggle_group">
            <label><input type="checkbox" id="dashed_toggle" checked> Show Component Completion Lines</label>
        </div>

        <div class="control-group field-expressions">
            <div class="title">Field Expressions</div>
            <div class="expr" id="ex-expression"></div>
            <div class="expr" id="ey-expression"></div>
        </div>

    </div>

    <script>
        const mainCanvas = document.getElementById('polCanvas');
        const topWaveCanvas = document.getElementById('topWaveCanvas');
        const leftWaveCanvas = document.getElementById('leftWaveCanvas');
        const poincareCanvas = document.getElementById('poincareCanvas');
        const ctx = mainCanvas.getContext('2d');
        const topCtx = topWaveCanvas.getContext('2d');
        const leftCtx = leftWaveCanvas.getContext('2d');
        const sphereCtx = poincareCanvas.getContext('2d');

        let logicalWidth = 500;
        let logicalHeight = 500;
        let topWidth = 500;
        let topHeight = 120;
        let leftWidth = 120;
        let leftHeight = 500;
        let sphereWidth = 280;
        let sphereHeight = 280;
        let cx = logicalWidth / 2;
        let cy = logicalHeight / 2;

        function resizeHiDpiCanvas(canvasEl, context) {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvasEl.getBoundingClientRect();
            const width = Math.round(rect.width);
            const height = Math.round(rect.height);
            canvasEl.width = Math.round(width * dpr);
            canvasEl.height = Math.round(height * dpr);
            context.setTransform(dpr, 0, 0, dpr, 0, 0);
            context.imageSmoothingEnabled = true;
            return { width, height };
        }

        function resizeCanvas() {
            const main = resizeHiDpiCanvas(mainCanvas, ctx);
            const top = resizeHiDpiCanvas(topWaveCanvas, topCtx);
            const left = resizeHiDpiCanvas(leftWaveCanvas, leftCtx);
            const sphere = resizeHiDpiCanvas(poincareCanvas, sphereCtx);

            logicalWidth = main.width;
            logicalHeight = main.height;
            topWidth = top.width;
            topHeight = top.height;
            leftWidth = left.width;
            leftHeight = left.height;
            sphereWidth = sphere.width;
            sphereHeight = sphere.height;
            cx = logicalWidth / 2;
            cy = logicalHeight / 2;
        }

        // Sliders and Displays
        const ampOSlider = document.getElementById('ampO');
        const ampESlider = document.getElementById('ampE');
        const phaseSlider = document.getElementById('phase');
        const currentPhaseSlider = document.getElementById('current_phase');
        const speedSlider = document.getElementById('speed');

        const ampOInput = document.getElementById('ampO_input');
        const ampEInput = document.getElementById('ampE_input');
        const phaseInput = document.getElementById('phase_input');
        const currentPhaseInput = document.getElementById('current_phase_input');
        const speedInput = document.getElementById('speed_input');
        const stepBackButton = document.getElementById('step_back_button');
        const pauseButton = document.getElementById('pause_button');
        const stepForwardButton = document.getElementById('step_forward_button');
        const vectorModeSelect = document.getElementById('vector_mode');
        const dashedToggleGroup = document.getElementById('dashed_toggle_group');
        const dashedToggle = document.getElementById('dashed_toggle');
        const panelSphere = document.getElementById('panel-sphere');
        const panelXY = document.getElementById('panel-xy');
        const controlsPanel = document.getElementById('controls-panel');
        const jonesNormKnown = document.getElementById('jones-norm-known');
        const jonesExKnown = document.getElementById('jones-ex-known');
        const jonesEyKnown = document.getElementById('jones-ey-known');
        const jonesPhaseTerm = document.getElementById('jones-phase-term');
        const exExpression = document.getElementById('ex-expression');
        const eyExpression = document.getElementById('ey-expression');

        let time = 0;
        let isPaused = false;
        let activeTrajectorySlider = null;
        let lastTimestamp = null;
        const TWO_PI = Math.PI * 2;
        const PI = Math.PI;
        const MARKER_RADIUS = 7;

        // Helper to draw an arrow
        function drawArrow(fromX, fromY, toX, toY, color, width = 3, dashed = false) {
            const headlen = 9; // length of head in pixels
            const dx = toX - fromX;
            const dy = toY - fromY;
            const angle = Math.atan2(dy, dx);
            
            // Don't draw if vector is virtually zero
            if(Math.sqrt(dx*dx + dy*dy) < 1) return;

            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            if (dashed) ctx.setLineDash([3, 3]);
            ctx.stroke();
            if (dashed) ctx.setLineDash([]);

            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.lineTo(toX, toY);
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawPolarizationEllipse(Ao, Ae, phaseXRad, phaseYRad) {
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]); // Dashed line for the path
            
            for (let t = 0; t <= Math.PI * 2.05; t += 0.05) {
                let px = cx + Ao * Math.cos(t + phaseXRad);
                // Negative because canvas Y goes down, but math Y goes up
                let py = cy - Ae * Math.cos(t + phaseYRad);
                
                if (t === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();
            ctx.setLineDash([]); // Reset dash
        }

        function drawTopWavePanel(Ao, Ae, phaseXRad, phaseYRad, currentTime) {
            topCtx.clearRect(0, 0, topWidth, topHeight);

            const pad = 12;
            const w = Math.max(1, topWidth - 2 * pad);
            const h = Math.max(1, topHeight - 2 * pad);
            const midY = pad + h / 2;
            const maxAmp = Math.max(1, Ao, Ae);
            const ampScale = (h * 0.45) / maxAmp;
            const tCurr = wrapToTwoPi(currentTime);
            const xCurr = pad + (tCurr / TWO_PI) * w;

            topCtx.setLineDash([4, 4]);
            topCtx.beginPath();
            topCtx.moveTo(xCurr, pad);
            topCtx.lineTo(xCurr, pad + h);
            topCtx.strokeStyle = 'rgba(255,255,255,0.6)';
            topCtx.lineWidth = 1.5;
            topCtx.stroke();
            topCtx.setLineDash([]);

            topCtx.beginPath();
            topCtx.strokeStyle = 'rgba(255,255,255,0.15)';
            topCtx.lineWidth = 1;
            topCtx.moveTo(pad, midY);
            topCtx.lineTo(pad + w, midY);
            topCtx.stroke();

            const sampleStep = 0.03;
            topCtx.beginPath();
            for (let t = 0; t <= TWO_PI + sampleStep; t += sampleStep) {
                const x = pad + (t / TWO_PI) * w;
                const y = midY - Ae * Math.cos(t + phaseYRad) * ampScale;
                if (t === 0) topCtx.moveTo(x, y);
                else topCtx.lineTo(x, y);
            }
            topCtx.strokeStyle = 'rgba(30,144,255,0.3)';
            topCtx.lineWidth = 2;
            topCtx.stroke();

            topCtx.beginPath();
            for (let t = 0; t <= TWO_PI + sampleStep; t += sampleStep) {
                const x = pad + (t / TWO_PI) * w;
                const y = midY - Ao * Math.cos(t + phaseXRad) * ampScale;
                if (t === 0) topCtx.moveTo(x, y);
                else topCtx.lineTo(x, y);
            }
            topCtx.strokeStyle = '#ff4757';
            topCtx.lineWidth = 2;
            topCtx.stroke();

            const yRed = midY - Ao * Math.cos(tCurr + phaseXRad) * ampScale;
            const yBlue = midY - Ae * Math.cos(tCurr + phaseYRad) * ampScale;

            topCtx.beginPath();
            topCtx.arc(xCurr, yBlue, MARKER_RADIUS, 0, TWO_PI);
            topCtx.fillStyle = 'rgba(30,144,255,0.3)';
            topCtx.fill();

            topCtx.beginPath();
            topCtx.arc(xCurr, yRed, MARKER_RADIUS, 0, TWO_PI);
            topCtx.fillStyle = '#ff4757';
            topCtx.fill();
        }

        function drawLeftWavePanel(Ao, Ae, phaseXRad, phaseYRad, currentTime) {
            leftCtx.clearRect(0, 0, leftWidth, leftHeight);

            const pad = 12;
            const w = Math.max(1, leftWidth - 2 * pad);
            const h = Math.max(1, leftHeight - 2 * pad);
            const midX = pad + w / 2;
            const maxAmp = Math.max(1, Ao, Ae);
            const ampScale = (w * 0.42) / maxAmp;
            const tCurr = wrapToTwoPi(currentTime);
            const yCurr = pad + (tCurr / TWO_PI) * h;

            leftCtx.setLineDash([4, 4]);
            leftCtx.beginPath();
            leftCtx.moveTo(pad, yCurr);
            leftCtx.lineTo(pad + w, yCurr);
            leftCtx.strokeStyle = 'rgba(255,255,255,0.6)';
            leftCtx.lineWidth = 1.5;
            leftCtx.stroke();
            leftCtx.setLineDash([]);

            leftCtx.beginPath();
            leftCtx.strokeStyle = 'rgba(255,255,255,0.15)';
            leftCtx.lineWidth = 1;
            leftCtx.moveTo(midX, pad);
            leftCtx.lineTo(midX, pad + h);
            leftCtx.stroke();

            const sampleStep = 0.03;
            leftCtx.beginPath();
            for (let t = 0; t <= TWO_PI + sampleStep; t += sampleStep) {
                const y = pad + (t / TWO_PI) * h;
                const x = midX + Ao * Math.cos(t + phaseXRad) * ampScale;
                if (t === 0) leftCtx.moveTo(x, y);
                else leftCtx.lineTo(x, y);
            }
            leftCtx.strokeStyle = 'rgba(255,71,87,0.3)';
            leftCtx.lineWidth = 2;
            leftCtx.stroke();

            leftCtx.beginPath();
            for (let t = 0; t <= TWO_PI + sampleStep; t += sampleStep) {
                const y = pad + (t / TWO_PI) * h;
                const x = midX + Ae * Math.cos(t + phaseYRad) * ampScale;
                if (t === 0) leftCtx.moveTo(x, y);
                else leftCtx.lineTo(x, y);
            }
            leftCtx.strokeStyle = '#1e90ff';
            leftCtx.lineWidth = 2;
            leftCtx.stroke();

            const xRed = midX + Ao * Math.cos(tCurr + phaseXRad) * ampScale;
            const xBlue = midX + Ae * Math.cos(tCurr + phaseYRad) * ampScale;

            leftCtx.beginPath();
            leftCtx.arc(xRed, yCurr, MARKER_RADIUS, 0, TWO_PI);
            leftCtx.fillStyle = 'rgba(255,71,87,0.3)';
            leftCtx.fill();

            leftCtx.beginPath();
            leftCtx.arc(xBlue, yCurr, MARKER_RADIUS, 0, TWO_PI);
            leftCtx.fillStyle = '#1e90ff';
            leftCtx.fill();
        }

        function drawPoincareSphere(Ao, Ae, phaseRad) {
            sphereCtx.clearRect(0, 0, sphereWidth, sphereHeight);

            const cX = sphereWidth / 2;
            const cY = sphereHeight / 2;
            const R = Math.min(sphereWidth, sphereHeight) * 0.38;

            const s0 = Ao * Ao + Ae * Ae;
            const s1 = s0 > 0 ? (Ao * Ao - Ae * Ae) / s0 : 0;
            const s2 = s0 > 0 ? (2 * Ao * Ae * Math.cos(phaseRad)) / s0 : 0;
            const s3 = s0 > 0 ? -(2 * Ao * Ae * Math.sin(phaseRad)) / s0 : 0;

            function stokesFrom(exAmp, eyAmp, phaseDiffRad) {
                const t0 = exAmp * exAmp + eyAmp * eyAmp;
                return {
                    q: t0 > 0 ? (exAmp * exAmp - eyAmp * eyAmp) / t0 : 0,
                    u: t0 > 0 ? (2 * exAmp * eyAmp * Math.cos(phaseDiffRad)) / t0 : 0,
                    v: t0 > 0 ? -(2 * exAmp * eyAmp * Math.sin(phaseDiffRad)) / t0 : 0
                };
            }

            const yaw = -28 * PI / 180;
            const pitch = 18 * PI / 180;
            const cyaw = Math.cos(yaw);
            const syaw = Math.sin(yaw);
            const cpitch = Math.cos(pitch);
            const spitch = Math.sin(pitch);

            // Map (Q,U,V) -> internal (x,y,z) with right-hand convention Q x U = V,
            // while keeping V visually upward on screen.
            // Display rotation: rotate (Q,U) about +V by 90 deg clockwise.
            function project(q, u, v) {
                const qRot = u;
                const uRot = -q;
                const x = qRot;
                const y = v;
                const z = -uRot;
                const x1 = x * cyaw + z * syaw;
                const z1 = -x * syaw + z * cyaw;
                const y2 = y * cpitch - z1 * spitch;
                const z2 = y * spitch + z1 * cpitch;
                return { x: cX + R * x1, y: cY - R * y2, depth: z2 };
            }

            function drawGreatCircle(pointFromT, colorFront, colorBack) {
                const dt = 0.04;

                sphereCtx.beginPath();
                for (let t = 0; t <= TWO_PI + dt; t += dt) {
                    const p = pointFromT(t);
                    const pr = project(p.x, p.y, p.z);
                    if (pr.depth < 0) {
                        if (t === 0 || pointFromT(t - dt) && project(pointFromT(t - dt).x, pointFromT(t - dt).y, pointFromT(t - dt).z).depth >= 0) {
                            sphereCtx.moveTo(pr.x, pr.y);
                        } else {
                            sphereCtx.lineTo(pr.x, pr.y);
                        }
                    }
                }
                sphereCtx.strokeStyle = colorBack;
                sphereCtx.lineWidth = 1.5;
                sphereCtx.setLineDash([4, 4]);
                sphereCtx.stroke();
                sphereCtx.setLineDash([]);

                sphereCtx.beginPath();
                for (let t = 0; t <= TWO_PI + dt; t += dt) {
                    const p = pointFromT(t);
                    const pr = project(p.x, p.y, p.z);
                    if (pr.depth >= 0) {
                        if (t === 0 || pointFromT(t - dt) && project(pointFromT(t - dt).x, pointFromT(t - dt).y, pointFromT(t - dt).z).depth < 0) {
                            sphereCtx.moveTo(pr.x, pr.y);
                        } else {
                            sphereCtx.lineTo(pr.x, pr.y);
                        }
                    }
                }
                sphereCtx.strokeStyle = colorFront;
                sphereCtx.lineWidth = 1.5;
                sphereCtx.stroke();
            }

            function drawAxis3D(x, y, z, label) {
                const pPos = project(x, y, z);
                const pNeg = project(-x, -y, -z);

                sphereCtx.beginPath();
                sphereCtx.moveTo(pNeg.x, pNeg.y);
                sphereCtx.lineTo(pPos.x, pPos.y);
                sphereCtx.strokeStyle = 'rgba(255,255,255,0.28)';
                sphereCtx.lineWidth = 1.2;
                sphereCtx.stroke();

                sphereCtx.beginPath();
                sphereCtx.moveTo(cX, cY);
                sphereCtx.lineTo(pPos.x, pPos.y);
                sphereCtx.strokeStyle = 'rgba(255,255,255,0.62)';
                sphereCtx.lineWidth = 1.5;
                sphereCtx.stroke();

                const lx = pPos.x + (pPos.x - cX) * 0.08;
                const ly = pPos.y + (pPos.y - cY) * 0.08;
                sphereCtx.fillStyle = 'rgba(255,255,255,0.92)';
                sphereCtx.font = 'bold 13px "STIX Two Math", "Cambria Math", "Times New Roman", serif';
                sphereCtx.textAlign = 'center';
                sphereCtx.textBaseline = 'middle';
                sphereCtx.fillText(label, lx, ly);
            }

            function drawAzElSectors(q, u, v) {
                const az = Math.atan2(u, q); // azimuth in Q-U plane
                const el = Math.atan2(v, Math.hypot(q, u)); // elevation above Q-U plane
                const n = 80;

                // Azimuth sector (on equator / V=0): +Q -> azimuth
                sphereCtx.beginPath();
                sphereCtx.moveTo(cX, cY);
                for (let i = 0; i <= n; i++) {
                    const t = (i / n) * az;
                    const p = project(Math.cos(t), Math.sin(t), 0);
                    sphereCtx.lineTo(p.x, p.y);
                }
                sphereCtx.closePath();
                sphereCtx.fillStyle = 'rgba(64, 140, 255, 0.2)';
                sphereCtx.fill();

                // Elevation sector (fixed azimuth meridian): equator -> current point
                const cq = Math.cos(az);
                const cu = Math.sin(az);
                sphereCtx.beginPath();
                sphereCtx.moveTo(cX, cY);
                for (let i = 0; i <= n; i++) {
                    const t = (i / n) * el;
                    const ct = Math.cos(t);
                    const st = Math.sin(t);
                    const p = project(ct * cq, ct * cu, st);
                    sphereCtx.lineTo(p.x, p.y);
                }
                sphereCtx.closePath();
                sphereCtx.fillStyle = 'rgba(255, 150, 20, 0.2)';
                sphereCtx.fill();
            }

            function drawActiveSliderTrajectory() {
                if (!activeTrajectorySlider) return;

                const points = [];
                const samples = 240;

                if (activeTrajectorySlider === 'ampO') {
                    const min = parseFloat(ampOSlider.min);
                    const max = parseFloat(ampOSlider.max);
                    for (let i = 0; i <= samples; i++) {
                        const ex = min + (i / samples) * (max - min);
                        points.push(stokesFrom(ex, Ae, phaseRad));
                    }
                } else if (activeTrajectorySlider === 'ampE') {
                    const min = parseFloat(ampESlider.min);
                    const max = parseFloat(ampESlider.max);
                    for (let i = 0; i <= samples; i++) {
                        const ey = min + (i / samples) * (max - min);
                        points.push(stokesFrom(Ao, ey, phaseRad));
                    }
                } else if (activeTrajectorySlider === 'phase') {
                    const min = parseFloat(phaseSlider.min) * PI;
                    const max = parseFloat(phaseSlider.max) * PI;
                    for (let i = 0; i <= samples; i++) {
                        const ph = min + (i / samples) * (max - min);
                        points.push(stokesFrom(Ao, Ae, ph));
                    }
                }

                if (points.length < 2) return;

                sphereCtx.beginPath();
                for (let i = 0; i < points.length; i++) {
                    const pr = project(points[i].q, points[i].u, points[i].v);
                    if (i === 0) sphereCtx.moveTo(pr.x, pr.y);
                    else sphereCtx.lineTo(pr.x, pr.y);
                }
                sphereCtx.strokeStyle = 'rgba(243,193,75,0.9)';
                sphereCtx.lineWidth = 2;
                sphereCtx.setLineDash([2, 6]);
                sphereCtx.lineCap = 'round';
                sphereCtx.stroke();
                sphereCtx.setLineDash([]);
                sphereCtx.lineCap = 'butt';
            }

            sphereCtx.beginPath();
            sphereCtx.arc(cX, cY, R, 0, TWO_PI);
            sphereCtx.fillStyle = 'rgba(255,255,255,0.03)';
            sphereCtx.fill();
            sphereCtx.strokeStyle = 'rgba(255,255,255,0.45)';
            sphereCtx.lineWidth = 2;
            sphereCtx.stroke();

            drawGreatCircle((t) => ({ x: Math.cos(t), y: Math.sin(t), z: 0 }), 'rgba(255,255,255,0.35)', 'rgba(255,255,255,0.2)');
            drawGreatCircle((t) => ({ x: Math.cos(t), y: 0, z: Math.sin(t) }), 'rgba(255,255,255,0.35)', 'rgba(255,255,255,0.2)');
            drawGreatCircle((t) => ({ x: 0, y: Math.cos(t), z: Math.sin(t) }), 'rgba(255,255,255,0.35)', 'rgba(255,255,255,0.2)');
            drawAzElSectors(s1, s2, s3);
            drawAxis3D(1, 0, 0, 'Q');
            drawAxis3D(0, 1, 0, 'U');
            drawAxis3D(0, 0, 1, 'V');
            drawActiveSliderTrajectory();

            const pPoint = project(s1, s2, s3);
            sphereCtx.beginPath();
            sphereCtx.moveTo(cX, cY);
            sphereCtx.lineTo(pPoint.x, pPoint.y);
            sphereCtx.strokeStyle = 'rgba(243,193,75,0.75)';
            sphereCtx.lineWidth = 2;
            sphereCtx.stroke();

            sphereCtx.beginPath();
            sphereCtx.arc(pPoint.x, pPoint.y, 7, 0, TWO_PI);
            sphereCtx.fillStyle = '#f3c14b';
            sphereCtx.fill();
            sphereCtx.strokeStyle = 'rgba(0,0,0,0.35)';
            sphereCtx.lineWidth = 1.5;
            sphereCtx.stroke();
        }

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function applyStep(value, stepRaw) {
            const step = parseFloat(stepRaw);
            if (!Number.isFinite(step) || step <= 0) return value;
            const decimals = (stepRaw.split('.')[1] || '').length;
            return Number((Math.round(value / step) * step).toFixed(decimals));
        }

        function wrapToTwoPi(value) {
            const wrapped = value % TWO_PI;
            return wrapped < 0 ? wrapped + TWO_PI : wrapped;
        }

        function snapHalfPiUnits(value) {
            const threshold = 0.025;
            let snapped = value;
            for (let k = 0; k <= 4; k++) {
                const target = k / 2; // 0, 0.5, 1.0, 1.5, 2.0
                if (Math.abs(value - target) <= threshold) {
                    snapped = target;
                    break;
                }
            }
            return snapped;
        }

        function snapQuarterPiUnits(value) {
            const threshold = 0.025;
            let snapped = value;
            for (let k = 0; k <= 8; k++) {
                const target = k / 4; // 0, 0.25, 0.5, ... , 2.0
                if (Math.abs(value - target) <= threshold) {
                    snapped = target;
                    break;
                }
            }
            return snapped;
        }

        function snapAmplitude150(value) {
            const target = 150;
            const threshold = 5;
            return Math.abs(value - target) <= threshold ? target : value;
        }

        function syncRangeAndInput(slider, input, transform = (v) => v) {
            const min = parseFloat(slider.min);
            const max = parseFloat(slider.max);
            const stepRaw = slider.step || '1';

            const updateFromRange = () => {
                let value = parseFloat(slider.value);
                value = transform(value);
                value = clamp(value, min, max);
                value = applyStep(value, stepRaw);
                slider.value = value;
                input.value = value;
            };

            const updateFromInput = () => {
                let value = parseFloat(input.value);
                if (!Number.isFinite(value)) return;
                value = transform(value);
                value = clamp(value, min, max);
                value = applyStep(value, stepRaw);
                slider.value = value;
                input.value = value;
            };

            slider.addEventListener('input', updateFromRange);
            input.addEventListener('input', updateFromInput);
            input.addEventListener('blur', updateFromInput);
            updateFromRange();
        }

        syncRangeAndInput(ampOSlider, ampOInput, snapAmplitude150);
        syncRangeAndInput(ampESlider, ampEInput, snapAmplitude150);
        syncRangeAndInput(phaseSlider, phaseInput, snapHalfPiUnits);
        syncRangeAndInput(speedSlider, speedInput);
        syncRangeAndInput(currentPhaseSlider, currentPhaseInput, snapQuarterPiUnits);

        function bindTrajectoryActivation(slider, key) {
            slider.addEventListener('pointerdown', () => { activeTrajectorySlider = key; });
            slider.addEventListener('focus', () => { activeTrajectorySlider = key; });
            slider.addEventListener('input', () => {
                if (document.activeElement === slider) activeTrajectorySlider = key;
            });
            slider.addEventListener('blur', () => {
                if (activeTrajectorySlider === key) activeTrajectorySlider = null;
            });
            slider.addEventListener('change', () => {
                if (activeTrajectorySlider === key) activeTrajectorySlider = null;
            });
        }

        bindTrajectoryActivation(ampOSlider, 'ampO');
        bindTrajectoryActivation(ampESlider, 'ampE');
        bindTrajectoryActivation(phaseSlider, 'phase');
        window.addEventListener('pointerup', () => { activeTrajectorySlider = null; });

        function setCurrentPhaseFromTime() {
            const wrappedPiUnits = Number((wrapToTwoPi(time) / PI).toFixed(2));
            currentPhaseSlider.value = wrappedPiUnits;
            currentPhaseInput.value = wrappedPiUnits;
        }

        function updateJonesLegend(Ao, Ae, phasePiUnits) {
            const eps = Number(phasePiUnits.toFixed(2));
            const ampMax = Math.max(Ao, Ae, 1e-9);
            const exScaled = Ao / ampMax;
            const eyScaled = Ae / ampMax;
            jonesNormKnown.textContent = `${ampMax.toFixed(1)}·`;
            jonesExKnown.textContent = `${exScaled.toFixed(2)}`;
            const eyIsZero = Math.abs(eyScaled) < 0.05;
            jonesEyKnown.textContent = eyIsZero ? `0` : `${eyScaled.toFixed(2)}·`;

            const k = Math.round(eps / 0.5);
            const snapEps = k * 0.5;
            if (eyIsZero) {
                jonesPhaseTerm.textContent = '';
            } else if (Math.abs(eps - snapEps) < 1e-6) {
                // e^{-iε} at ε = k * (pi/2): 1, -i, -1, i, ...
                const factors = ['1', '-i', '-1', 'i'];
                const factor = factors[((k % 4) + 4) % 4];
                if (factor === '1') {
                    jonesEyKnown.textContent = `${eyScaled.toFixed(2)}`;
                    jonesPhaseTerm.textContent = '';
                } else if (factor === 'i') {
                    jonesEyKnown.textContent = `${eyScaled.toFixed(2)}`;
                    jonesPhaseTerm.textContent = 'i';
                } else if (factor === '-1') {
                    jonesEyKnown.textContent = `-${eyScaled.toFixed(2)}`;
                    jonesPhaseTerm.textContent = '';
                } else { // -i
                    jonesEyKnown.textContent = `-${eyScaled.toFixed(2)}`;
                    jonesPhaseTerm.textContent = 'i';
                }
            } else {
                jonesPhaseTerm.innerHTML = `<span class="math-var">e</span><sup><span class="math-var">-i(${eps.toFixed(2)}π)</span></sup>`;
            }
        }

        function updateFieldExpressions(Ao, Ae, phasePiUnits) {
            const eps = Number(phasePiUnits).toFixed(2);
            exExpression.innerHTML = `<span class="math-var">E</span><sub>x</sub>(<span class="math-var">t</span>) = ${Ao.toFixed(0)} cos(-<span class="math-symbol">ω</span><span class="math-var">t</span> + <span class="math-var">ε</span><sub>x</sub>)`;
            eyExpression.innerHTML = `<span class="math-var">E</span><sub>y</sub>(<span class="math-var">t</span>) = ${Ae.toFixed(0)} cos(-<span class="math-symbol">ω</span><span class="math-var">t</span> + <span class="math-var">ε</span><sub>x</sub> + ${eps}<span class="math-symbol">π</span>)`;
        }

        const setTimeFromCurrentPhaseControl = (valueRaw) => {
            let value = parseFloat(valueRaw);
            if (!Number.isFinite(value)) return;
            value = clamp(value, 0, 2);
            value = snapQuarterPiUnits(value);
            value = applyStep(value, currentPhaseSlider.step);
            time = value * PI;
            currentPhaseSlider.value = value;
            currentPhaseInput.value = value;
        };

        currentPhaseSlider.addEventListener('input', () => setTimeFromCurrentPhaseControl(currentPhaseSlider.value));
        currentPhaseInput.addEventListener('input', () => setTimeFromCurrentPhaseControl(currentPhaseInput.value));
        currentPhaseInput.addEventListener('blur', () => setTimeFromCurrentPhaseControl(currentPhaseInput.value));
        setCurrentPhaseFromTime();

        function stepTime(direction, dtSec = 1 / 60) {
            const speedPiPerSec = parseFloat(speedSlider.value);
            time += direction * speedPiPerSec * PI * dtSec;
            setCurrentPhaseFromTime();
        }

        stepBackButton.addEventListener('click', () => stepTime(-1));
        stepForwardButton.addEventListener('click', () => stepTime(1));

        pauseButton.addEventListener('click', () => {
            isPaused = !isPaused;
            pauseButton.textContent = isPaused ? '>' : '||';
            pauseButton.classList.toggle('paused', isPaused);
        });

        function updateDashedToggleVisibility() {
            const componentMode = vectorModeSelect.value === 'component';
            dashedToggleGroup.style.display = componentMode ? 'block' : 'none';
        }

        vectorModeSelect.addEventListener('change', updateDashedToggleVisibility);
        updateDashedToggleVisibility();

        function drawDashedRectangleSides(drawX, drawY) {
            ctx.setLineDash([3, 3]);
            ctx.lineWidth = 2;

            // Horizontal completion side, same color as O-ray (red)
            ctx.beginPath();
            ctx.moveTo(cx, drawY);
            ctx.lineTo(drawX, drawY);
            ctx.strokeStyle = '#ff4757';
            ctx.stroke();

            // Vertical completion side, same color as E-ray (blue)
            ctx.beginPath();
            ctx.moveTo(drawX, cy);
            ctx.lineTo(drawX, drawY);
            ctx.strokeStyle = '#1e90ff';
            ctx.stroke();

            ctx.setLineDash([]);
        }


        function animate(timestamp) {
            if (lastTimestamp === null) lastTimestamp = timestamp;
            const dtSec = Math.min(0.05, Math.max(0, (timestamp - lastTimestamp) / 1000));
            lastTimestamp = timestamp;

            // Get current values
            const Ao = parseFloat(ampOSlider.value);
            const Ae = parseFloat(ampESlider.value);
            const phaseDiffRad = parseFloat(phaseSlider.value) * PI;
            const phasePiUnits = parseFloat(phaseSlider.value);
            const phaseXRad = 0;
            const phaseYRad = phaseXRad - phaseDiffRad;
            updateJonesLegend(Ao, Ae, phasePiUnits);
            updateFieldExpressions(Ao, Ae, phasePiUnits);

            // Clear canvas
            ctx.clearRect(0, 0, logicalWidth, logicalHeight);
            drawTopWavePanel(Ao, Ae, phaseXRad, phaseYRad, time);
            drawLeftWavePanel(Ao, Ae, phaseXRad, phaseYRad, time);
            drawPoincareSphere(Ao, Ae, phaseDiffRad);

            // Draw axes
            ctx.beginPath();
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 1;
            ctx.moveTo(0, cy); ctx.lineTo(logicalWidth, cy);
            ctx.moveTo(cx, 0); ctx.lineTo(cx, logicalHeight);
            ctx.stroke();

            // Draw the traced path (Polarization Ellipse)
            drawPolarizationEllipse(Ao, Ae, phaseXRad, phaseYRad);

            // Calculate current vector positions
            // Equations: x(t) = Ao * cos(ωt + εx), y(t) = Ae * cos(ωt + εy)
            let currentX = Ao * Math.cos(time + phaseXRad);
            let currentY = Ae * Math.cos(time + phaseYRad);

            // Canvas Y coordinates are inverted (0 is top, height is bottom)
            let drawX = cx + currentX;
            let drawY = cy - currentY;

            // Draw vectors
            const vectorMode = vectorModeSelect.value;
            const showDashed = dashedToggle.checked;

            if (vectorMode === 'head-to-tail') {
                drawArrow(cx, cy, drawX, cy, '#ff4757'); // O-ray
                drawArrow(drawX, cy, drawX, drawY, '#1e90ff'); // E-ray from O-ray tip
            } else {
                drawArrow(cx, cy, drawX, cy, '#ff4757'); // O-ray
                drawArrow(cx, cy, cx, drawY, '#1e90ff'); // E-ray
                if (showDashed) {
                    drawDashedRectangleSides(drawX, drawY);
                }
            }
            drawArrow(cx, cy, drawX, drawY, '#f3c14b', 4); // Resultant (Gold)

            // Increment time unless paused
            if (!isPaused) {
                stepTime(1, dtSec);
            } else {
                setCurrentPhaseFromTime();
            }

            requestAnimationFrame(animate);
        }

        function applyUnifiedPanelSizing() {
            const isMobile = window.innerWidth <= 1024;
            const gridGap = 10;
            const panelPadding = 40; // left+right padding from .canvas-container

            if (isMobile) {
                const availableW = Math.max(320, window.innerWidth - 24);
                const xyInnerW = Math.max(260, availableW - panelPadding);
                const sideSize = Math.max(56, Math.min(110, Math.round(xyInnerW * 0.18)));
                const mainSize = Math.max(220, xyInnerW - sideSize - gridGap);

                document.documentElement.style.setProperty('--main-size', `${mainSize}px`);
                document.documentElement.style.setProperty('--side-size', `${sideSize}px`);
                document.documentElement.style.setProperty('--panel-h', `auto`);

                panelSphere.style.height = 'auto';
                panelXY.style.height = 'auto';
                controlsPanel.style.height = 'auto';
                panelSphere.style.width = '100%';
                panelXY.style.width = '100%';
                controlsPanel.style.width = '100%';
                return;
            }

            // Desktop/tablet landscape: constrain by both height and total width
            // so all three panels stay fully visible (no left/right cropping).
            const hByHeight = window.innerHeight - 24;
            const bodyPaddingX = 24; // 12px left + 12px right
            const bodyGapsX = 40;    // two 20px gaps between three panels
            const fixedX = 50;       // xy panel fixed term from grid gap + panel padding
            const coeffX = 1.84;     // sphere(0.52h) + xy(0.84h) + controls(0.48h)
            const hByWidth = (window.innerWidth - bodyPaddingX - bodyGapsX - fixedX) / coeffX;
            const panelHeight = Math.max(420, Math.min(hByHeight, hByWidth, 820));
            const h = `${Math.round(panelHeight)}px`;
            document.documentElement.style.setProperty('--panel-h', h);

            const mainSize = Math.round(panelHeight * 0.66);
            const sideSize = Math.round(panelHeight * 0.18);
            const sphereW = Math.round(panelHeight * 0.52);
            const controlsW = Math.round(panelHeight * 0.48);
            const xyInnerW = sideSize + mainSize + gridGap;
            const xyW = xyInnerW + panelPadding;

            document.documentElement.style.setProperty('--main-size', `${mainSize}px`);
            document.documentElement.style.setProperty('--side-size', `${sideSize}px`);

            panelSphere.style.height = h;
            panelXY.style.height = h;
            controlsPanel.style.height = h;
            panelSphere.style.width = `${sphereW}px`;
            panelXY.style.width = `${xyW}px`;
            controlsPanel.style.width = `${controlsW}px`;
        }

        function handleResize() {
            applyUnifiedPanelSizing();
            resizeCanvas();
        }

        handleResize();
        window.addEventListener('resize', handleResize);

        // Start animation loop
        requestAnimationFrame(animate);
    </script>
</body>
</html>
